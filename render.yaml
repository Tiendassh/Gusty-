# render.yaml
services:
  - type: web
    name: noviaia-web
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: noviaia-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: noviaia-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  - type: redis
    name: noviaia-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

databases:
  - name: noviaia-db
    plan: free
    postgresMajorVersion: "15"