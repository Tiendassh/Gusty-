services:
  - type: web
    name: anonstream
    runtime: node
    region: oregon  # Cambia según tu región preferida
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://anonstream.onrender.com  # Tu URL de Render
    # El directorio dist/ se generará automáticamente

# Nota: No necesitas especificar el directorio de build aquí,
// Render detecta automáticamente la configuración de Next.js